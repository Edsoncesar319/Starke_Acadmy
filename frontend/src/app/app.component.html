@if (showShell) {
  <div class="min-h-[100dvh] overflow-x-hidden bg-obsidian-gradient">
    <app-side-nav />
    <main
      class="main-content min-h-[100dvh] w-full min-w-0 max-w-[100vw] transition-all duration-300 ease-in-out motion-reduce:transition-none"
      [ngClass]="layout.mainOffsetClass()"
    >
      <div class="page-shell">
        <app-top-app-bar
          [title]="pageTitle()"
          [studentName]="student().name"
          [studentLevel]="student().studentLevel"
          [avatarUrl]="student().avatarUrl"
          [navCollapsed]="layout.collapsed()"
          (toggleNav)="layout.toggle()"
          (logout)="logout()"
        />
        <router-outlet />
      </div>
    </main>
  </div>
} @else {
  <div class="starke-bg min-h-[100dvh]">
    <main class="page-auth relative z-10 min-h-[100dvh]">
      <router-outlet />
    </main>
  </div>
}
